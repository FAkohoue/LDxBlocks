url: https://FAkohoue.github.io/LDxBlocks/

template:
  bootstrap: 5
  bootswatch: flatly
  includes:
    in_header: |
      <link rel="preconnect" href="https://fonts.googleapis.com">
      <link href="https://fonts.googleapis.com/css2?family=Source+Code+Pro:wght@400;600&display=swap" rel="stylesheet">

navbar:
  structure:
    left:  [intro, reference, articles, news]
    right: [search, github]
  components:
    github:
      icon: fab fa-github fa-lg
      href: https://github.com/FAkohoue/LDxBlocks
      aria-label: GitHub

home:
  title: "LDxBlocks — Genome-Wide LD Block Detection"
  description: >
    Fast, scalable LD block detection using r² or kinship-adjusted rV²,
    with C++/Armadillo acceleration, multi-format I/O, comprehensive haplotype
    analysis (phased and unphased), post-GWAS QTL mapping, and genomic
    prediction feature engineering.
  links:
    - text: Browse source code
      href: https://github.com/FAkohoue/LDxBlocks
    - text: Report a bug
      href: https://github.com/FAkohoue/LDxBlocks/issues

articles:
  - title: "Getting started"
    navbar: ~
    contents:
      - LDxBlocks-intro
  - title: "Methods"
    navbar: "Methods"
    contents:
      - LDxBlocks-ld-metrics
  - title: "Advanced"
    navbar: "Advanced"
    contents:
      - LDxBlocks-large-scale

reference:
  - title: "Package"
    desc: Package-level documentation and overview.
    contents:
      - LDxBlocks-package

  - title: "Main pipeline"
    desc: >
      High-level functions for genome-wide LD block detection.
      `run_Big_LD_all_chr()` is the recommended entry point.
    contents:
      - run_Big_LD_all_chr
      - Big_LD
      - CLQD
      - tune_LD_params
      - run_ldx_pipeline

  - title: "Genotype I/O"
    desc: >
      Read genotype data from six formats (numeric dosage CSV, HapMap,
      VCF, GDS, PLINK BED, R matrix) through a unified backend interface.
    contents:
      - read_geno
      - read_chunk
      - close_backend
      - print.LDxBlocks_backend
      - summary.LDxBlocks_backend

  - title: "LD computation"
    desc: >
      LD matrix computation: standard r² and kinship-adjusted rV².
    contents:
      - compute_ld
      - compute_r2
      - compute_rV2
      - prepare_geno
      - get_V_inv_sqrt

  - title: "Phasing"
    desc: >
      Functions for obtaining gametic phase from WGS data (Beagle),
      pedigree records, or pre-phased VCF files.
    contents:
      - read_phased_vcf
      - phase_with_beagle
      - phase_with_pedigree
      - unphase_to_dosage

  - title: "Haplotype analysis"
    desc: >
      Extract haplotypes within LD blocks (phased or unphased), compute
      diversity metrics, map GWAS hits to QTL regions, and build feature
      matrices for genomic prediction.
    contents:
      - extract_haplotypes
      - compute_haplotype_diversity
      - define_qtl_regions
      - build_haplotype_feature_matrix

  - title: "Haplotype output writers"
    desc: >
      Write haplotype matrices and diversity tables to disk in formats
      compatible with TASSEL, GAPIT, rrBLUP, BGLR, and ASReml-R.
    contents:
      - write_haplotype_numeric
      - write_haplotype_hapmap
      - write_haplotype_diversity

  - title: "Utilities"
    desc: Summary statistics and visualisation for block tables.
    contents:
      - summarise_blocks
      - plot_ld_blocks

  - title: "Example data"
    desc: >
      Simulated datasets (120 individuals, 230 SNPs, 3 chromosomes,
      9 LD blocks) for examples and tests.
    contents:
      - ldx_geno
      - ldx_snp_info
      - ldx_blocks
      - ldx_gwas

news:
  releases:
    - text: "LDxBlocks 0.3.0"
      href: https://github.com/FAkohoue/LDxBlocks/releases/tag/v0.3.0
