url: https://FAkohoue.github.io/LDxBlocks/
template:
  bootstrap: 5
  bootswatch: flatly
  includes:
    in_header: |
      <link rel="preconnect" href="https://fonts.googleapis.com">
      <link href="https://fonts.googleapis.com/css2?family=Source+Code+Pro:wght@400;600&display=swap" rel="stylesheet">
navbar:
  structure:
    left:  [intro, reference, articles, news]
    right: [search, github]
  components:
    github:
      icon: fab fa-github fa-lg
      href: https://github.com/FAkohoue/LDxBlocks
      aria-label: GitHub
home:
  title: "LDxBlocks -- Genome-Wide LD Block Detection"
  description: >
    Fast, scalable LD block detection using r2 or kinship-adjusted rV2,
    with C++/Armadillo acceleration, multi-format I/O, and a
    never-full-genome memory model. WGS-scale acceleration via Louvain/Leiden
    community detection (polynomial-time, no clique blowup), sparse LD
    computation (max_bp_distance), and a bigmemory file-backed matrix store.
    Complete downstream pipeline: haplotype analysis (phased and unphased),
    diversity metrics, post-GWAS QTL mapping, single and multi-trait
    haplotype-based genomic prediction (rrBLUP per trait, shared GRM), and three-evidence
    block ranking for haplotype stacking.
  links:
    - text: Browse source code
      href: https://github.com/FAkohoue/LDxBlocks
    - text: Report a bug
      href: https://github.com/FAkohoue/LDxBlocks/issues
articles:
  - title: "Getting started"
    navbar: ~
    contents:
      - LDxBlocks-intro
  - title: "Methods"
    navbar: "Methods"
    contents:
      - LDxBlocks-ld-metrics
  - title: "Advanced"
    navbar: "Advanced"
    contents:
      - LDxBlocks-large-scale
reference:
  - title: "Package"
    desc: Package-level documentation and overview.
    contents:
      - LDxBlocks-package
  - title: "Main pipeline"
    desc: >
      High-level functions for genome-wide LD block detection.
      run_Big_LD_all_chr() is the recommended entry point.
      run_ldx_pipeline() runs the complete end-to-end workflow from
      a single file path.
    contents:
      - run_Big_LD_all_chr
      - tune_LD_params
      - run_ldx_pipeline
  - title: "Genotype I/O"
    desc: >
      Read genotype data from six formats (numeric dosage CSV, HapMap,
      VCF, GDS, PLINK BED, R matrix) through a unified backend interface.
      For WGS-scale panels where peak RAM is a constraint,
      read_geno_bigmemory() creates a file-backed memory-mapped store
      (requires bigmemory) with OS-page-fault column access.
    contents:
      - read_geno
      - read_chunk
      - close_backend
      - print.LDxBlocks_backend
      - summary.LDxBlocks_backend
      - read_geno_bigmemory
  - title: "LD computation"
    desc: >
      LD matrix computation: standard r2 and kinship-adjusted rV2.
    contents:
      - compute_r2
      - compute_rV2
      - prepare_geno
      - get_V_inv_sqrt
  - title: "Phasing"
    desc: >
      Functions for obtaining gametic phase from WGS data (Beagle),
      pedigree records, or pre-phased VCF files.
    contents:
      - read_phased_vcf
      - phase_with_beagle
      - phase_with_pedigree
  - title: "Haplotype analysis"
    desc: >
      Extract haplotypes within LD blocks (phased or unphased), decode
      haplotype strings to nucleotide sequences, compute diversity metrics,
      map GWAS hits to QTL regions, and build feature matrices for
      genomic prediction.
    contents:
      - extract_haplotypes
      - decode_haplotype_strings
      - compute_haplotype_diversity
      - define_qtl_regions
      - build_haplotype_feature_matrix
      - compute_haplotype_grm
  - title: "Haplotype output writers"
    desc: >
      Write haplotype matrices and diversity tables to disk.
      Numeric format: phased=0/1/2/NA, unphased=0/1/NA dosage;
      rows=haplotypes, cols=individuals.
      Character format: nucleotide sequences with IUPAC ambiguity codes
      for heterozygous positions; rows=haplotypes, cols=individuals.
    contents:
      - write_haplotype_numeric
      - write_haplotype_character
      - write_haplotype_diversity
  - title: "Genomic prediction pipeline (Tong et al. 2024/2025)"
    desc: >
      Haplotype-based genomic prediction following Tong et al. (2024/2025).
      run_haplotype_prediction() accepts a single trait (named vector or
      one-column data frame) or multiple traits (wide data frame or named
      list). All traits are fitted via rrBLUP::kin.blup() per trait using
      a shared GRM. Block importance is aggregated across traits
      for robust haplotype stacking candidate identification.
    contents:
      - prepare_gblup_inputs
      - run_haplotype_prediction
      - backsolve_snp_effects
      - compute_local_gebv
      - integrate_gwas_haplotypes
      - rank_haplotype_blocks
  - title: "Utilities"
    desc: Summary statistics and visualisation for block tables.
    contents:
      - summarise_blocks
      - plot_ld_blocks
  - title: "Example data"
    desc: >
      Simulated datasets (120 individuals, 230 SNPs, 3 chromosomes,
      9 LD blocks) for examples and tests.
    contents:
      - ldx_geno
      - ldx_snp_info
      - ldx_blocks
      - ldx_gwas
      - ldx_blues
