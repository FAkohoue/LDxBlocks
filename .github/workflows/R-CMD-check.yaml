name: R-CMD-check

on:
  push:
    branches: [main, master, dev]
  pull_request:
    branches: [main, master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  R-CMD-check:
    name: ${{ matrix.config.os }} (R ${{ matrix.config.r }})
    runs-on: ${{ matrix.config.os }}
    # bigmemory matrix build + haplotype extraction can take >30 min on slow runners
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        config:
          - { os: ubuntu-latest,  r: "release"  }
          - { os: ubuntu-latest,  r: "devel"    }
          - { os: ubuntu-latest,  r: "oldrel-1" }
          - { os: macos-latest,   r: "release"  }
          - { os: windows-latest, r: "release"  }

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: true
      # NOT_CRAN=true causes testthat to run skip_on_cran() blocks and
      # R CMD check to honour \donttest{} as testable examples.
      NOT_CRAN: true

    steps:
      - uses: actions/checkout@v4

      - name: Set up pandoc
        uses: r-lib/actions/setup-pandoc@v2

      - name: Set up R ${{ matrix.config.r }}
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.config.r }}
          use-public-rspm: true

      # ── OpenMP on macOS ──────────────────────────────────────────────────────
      # Apple clang does not ship with OpenMP. Install libomp via Homebrew so
      # that $(SHLIB_OPENMP_CXXFLAGS) in src/Makevars resolves to a real flag.
      # Without this, the package still compiles (SHLIB_OPENMP_CXXFLAGS is
      # empty on vanilla macOS R) but n_threads > 1 becomes a no-op.
      - name: Install OpenMP runtime (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install libomp
          # Tell the compiler and linker where libomp lives.
          # R on macOS reads these from ~/.R/Makevars at build time.
          mkdir -p ~/.R
          LIBOMP=$(brew --prefix libomp)
          cat >> ~/.R/Makevars << EOF
          CPPFLAGS += -Xpreprocessor -fopenmp -I${LIBOMP}/include
          CFLAGS   += -Xpreprocessor -fopenmp
          CXXFLAGS += -Xpreprocessor -fopenmp
          LDFLAGS  += -L${LIBOMP}/lib -lomp
          EOF

      # ── System libraries (Linux) ─────────────────────────────────────────────
      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            libhdf5-dev \
            libcurl4-openssl-dev \
            libssl-dev \
            libxml2-dev \
            libgit2-dev \
            libfontconfig1-dev \
            libharfbuzz-dev \
            libfribidi-dev \
            libfreetype6-dev \
            libpng-dev \
            libtiff5-dev \
            libjpeg-dev

      # ── Bioconductor packages ────────────────────────────────────────────────
      # SNPRelate and gdsfmt are in Suggests — install before CRAN deps so
      # that setup-r-dependencies does not try to source-build them.
      # ASRgenomics depends on vsn (Bioconductor) so install vsn here too.
      - name: Install Bioconductor packages
        shell: Rscript {0}
        run: |
          if (!requireNamespace("BiocManager", quietly = TRUE))
            install.packages("BiocManager", repos = "https://cloud.r-project.org")
          BiocManager::install(ask = FALSE, update = FALSE)
          bioc_pkgs <- c("SNPRelate", "gdsfmt", "vsn")
          to_install <- bioc_pkgs[!vapply(bioc_pkgs, requireNamespace,
                                          logical(1L), quietly = TRUE)]
          if (length(to_install))
            BiocManager::install(to_install, ask = FALSE, update = FALSE)

      # ── R package cache ──────────────────────────────────────────────────────
      # Cache is keyed on DESCRIPTION so it invalidates when any dependency
      # version changes. Must come AFTER Bioc install so cached state includes
      # Bioc packages.
      - name: Cache R packages
        uses: actions/cache@v4
        with:
          path: ${{ env.R_LIBS_USER }}
          key: ${{ runner.os }}-r-${{ matrix.config.r }}-${{ hashFiles('DESCRIPTION') }}
          restore-keys: |
            ${{ runner.os }}-r-${{ matrix.config.r }}-

      # ── CRAN + GitHub dependencies ───────────────────────────────────────────
      - name: Install R dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: |
            any::rcmdcheck
            any::covr
          needs: check

      # ── R CMD check ──────────────────────────────────────────────────────────
      # --run-donttest: run \donttest{} examples (bigmemory Path B, WGS examples)
      #   when NOT_CRAN=true. Without this flag those examples are always skipped
      #   even with NOT_CRAN set.
      # --no-manual: skip PDF manual build (requires LaTeX, slow, not needed for CI).
      # --as-cran: apply CRAN-level checks (no T/F, no partial matching, etc.).
      - name: Check package
        uses: r-lib/actions/check-r-package@v2
        with:
          upload-snapshots: true
          build_args: 'c("--no-manual")'
          args: 'c("--no-manual", "--as-cran", "--run-donttest")'

      # ── Upload logs on failure ────────────────────────────────────────────────
      - name: Upload check results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ runner.os }}-r${{ matrix.config.r }}-results
          path: ${{ runner.os }}.Rcheck
